<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - MORGANREIGNS303</title>
    <style>
        :root {
            --matrix-green: #00ff41;
            --matrix-green-dark: #003b00;
            --matrix-green-glow: #00ff41;
            --bg-black: #0a0a0a;
            --glitch-red: #ff0040;
            --glitch-blue: #00bfff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: 'Courier New', 'Courier', 'Lucida Console', 'Consolas', 'Monaco', monospace;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            cursor: crosshair;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            position: relative;
        }

        /* ==================== MATRIX RAIN CANVAS ==================== */
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.75;
            pointer-events: none;
        }

        /* ==================== SCAN LINES OVERLAY ==================== */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.08) 2px,
                    rgba(0, 0, 0, 0.08) 4px);
        }

        /* ==================== VIGNETTE ==================== */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
            background: radial-gradient(ellipse at center,
                    transparent 55%,
                    rgba(0, 0, 0, 0.7) 85%,
                    rgba(0, 0, 0, 0.95) 100%);
        }

        /* ==================== MAIN CONTENT CONTAINER ==================== */
        .content-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        /* ==================== GLITCH CONTAINER ==================== */
        .glitch-container {
            text-align: center;
            padding: 40px 30px;
            position: relative;
            background: rgba(0, 0, 0, 0.65);
            border: 2px solid rgba(0, 255, 65, 0.3);
            border-radius: 4px;
            box-shadow:
                0 0 30px rgba(0, 255, 65, 0.15),
                0 0 60px rgba(0, 255, 65, 0.06),
                inset 0 0 30px rgba(0, 255, 65, 0.04);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            animation: containerFlicker 5s infinite;
        }

        @keyframes containerFlicker {
            0%,
            100% {
                border-color: rgba(0, 255, 65, 0.3);
                box-shadow: 0 0 30px rgba(0, 255, 65, 0.15), 0 0 60px rgba(0, 255, 65, 0.06), inset 0 0 30px rgba(0, 255, 65, 0.04);
            }
            2% {
                border-color: rgba(0, 255, 65, 0.6);
                box-shadow: 0 0 40px rgba(0, 255, 65, 0.25), 0 0 80px rgba(0, 255, 65, 0.1), inset 0 0 40px rgba(0, 255, 65, 0.07);
            }
            2.5% {
                border-color: rgba(0, 255, 65, 0.15);
                box-shadow: 0 0 15px rgba(0, 255, 65, 0.08), 0 0 30px rgba(0, 255, 65, 0.03), inset 0 0 15px rgba(0, 255, 65, 0.02);
            }
            35% {
                border-color: rgba(0, 255, 65, 0.3);
                box-shadow: 0 0 30px rgba(0, 255, 65, 0.15), 0 0 60px rgba(0, 255, 65, 0.06), inset 0 0 30px rgba(0, 255, 65, 0.04);
            }
            35.5% {
                border-color: rgba(0, 255, 65, 0.7);
                box-shadow: 0 0 50px rgba(0, 255, 65, 0.3), 0 0 90px rgba(0, 255, 65, 0.12), inset 0 0 45px rgba(0, 255, 65, 0.09);
            }
            36% {
                border-color: rgba(0, 255, 65, 0.3);
                box-shadow: 0 0 30px rgba(0, 255, 65, 0.15), 0 0 60px rgba(0, 255, 65, 0.06), inset 0 0 30px rgba(0, 255, 65, 0.04);
            }
        }

        /* ==================== TITLE - MORGANREIGNS303 IN HERE ==================== */
        .glitch-title {
            font-size: clamp(1.6rem, 4vw, 3.2rem);
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--matrix-green);
            text-shadow:
                0 0 7px var(--matrix-green-glow),
                0 0 14px var(--matrix-green-glow),
                0 0 28px var(--matrix-green),
                0 0 50px var(--matrix-green-dark);
            position: relative;
            display: inline-block;
            margin-bottom: 10px;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            0% {
                text-shadow: 0 0 7px #00ff41, 0 0 14px #00ff41, 0 0 28px #00ff41, 0 0 50px #003b00;
            }
            100% {
                text-shadow: 0 0 10px #00ff41, 0 0 20px #00ff41, 0 0 40px #00ff41, 0 0 70px #005500, 0 0 90px #003b00;
            }
        }

        /* Glitch pseudo-elements for title */
        .glitch-title::before,
        .glitch-title::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
        }

        .glitch-title::before {
            color: var(--glitch-red);
            z-index: -1;
            animation: glitchShiftBefore 3s infinite;
            text-shadow: 2px 0 #ff0040, -1px 0 #ff0040;
            clip-path: inset(0 0 0 0);
        }

        .glitch-title::after {
            color: var(--glitch-blue);
            z-index: -2;
            animation: glitchShiftAfter 3s infinite;
            text-shadow: -2px 0 #00bfff, 1px 0 #00bfff;
            clip-path: inset(0 0 0 0);
        }

        @keyframes glitchShiftBefore {
            0%,
            100% {
                opacity: 0;
                transform: translate(0, 0);
            }
            5% {
                opacity: 0.5;
                transform: translate(-3px, 2px);
            }
            5.5% {
                opacity: 0;
                transform: translate(0, 0);
            }
            30% {
                opacity: 0;
                transform: translate(0, 0);
            }
            32% {
                opacity: 0.4;
                transform: translate(4px, -1px);
            }
            32.3% {
                opacity: 0;
                transform: translate(0, 0);
            }
            65% {
                opacity: 0;
                transform: translate(0, 0);
            }
            67% {
                opacity: 0.55;
                transform: translate(-2px, -2px);
            }
            67.4% {
                opacity: 0;
                transform: translate(0, 0);
            }
        }

        @keyframes glitchShiftAfter {
            0%,
            100% {
                opacity: 0;
                transform: translate(0, 0);
            }
            5% {
                opacity: 0.5;
                transform: translate(3px, -2px);
            }
            5.5% {
                opacity: 0;
                transform: translate(0, 0);
            }
            30% {
                opacity: 0;
                transform: translate(0, 0);
            }
            32% {
                opacity: 0.4;
                transform: translate(-4px, 1px);
            }
            32.3% {
                opacity: 0;
                transform: translate(0, 0);
            }
            65% {
                opacity: 0;
                transform: translate(0, 0);
            }
            67% {
                opacity: 0.55;
                transform: translate(2px, 2px);
            }
            67.4% {
                opacity: 0;
                transform: translate(0, 0);
            }
        }

        /* ==================== SUBTITLE - 404 NOT FOUND NGAPAIN LIAT-LIAT ? ==================== */
        .glitch-subtitle {
            font-size: clamp(1rem, 2.5vw, 1.8rem);
            font-weight: bold;
            letter-spacing: 2px;
            color: #e0e0e0;
            text-shadow:
                0 0 5px rgba(255, 255, 255, 0.6),
                0 0 10px rgba(200, 200, 200, 0.3),
                0 0 20px rgba(150, 150, 150, 0.2);
            position: relative;
            display: inline-block;
            animation: subtitleFlicker 4s infinite;
        }

        @keyframes subtitleFlicker {
            0%,
            100% {
                opacity: 1;
            }
            8% {
                opacity: 0.7;
            }
            8.5% {
                opacity: 1;
            }
            45% {
                opacity: 1;
            }
            46% {
                opacity: 0.65;
            }
            46.5% {
                opacity: 1;
            }
            78% {
                opacity: 1;
            }
            79% {
                opacity: 0.5;
            }
            79.3% {
                opacity: 1;
            }
        }

        /* Glitch pseudo-elements for subtitle - milder */
        .glitch-subtitle::before,
        .glitch-subtitle::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
        }

        .glitch-subtitle::before {
            color: #ff6b6b;
            z-index: -1;
            animation: subGlitchBefore 4s infinite;
            text-shadow: 1px 0 #ff6b6b;
            clip-path: inset(30% 0 25% 0);
        }

        .glitch-subtitle::after {
            color: #6bb5ff;
            z-index: -2;
            animation: subGlitchAfter 4s infinite;
            text-shadow: -1px 0 #6bb5ff;
            clip-path: inset(55% 0 15% 0);
        }

        @keyframes subGlitchBefore {
            0%,
            100% {
                opacity: 0;
                transform: translate(0, 0);
            }
            10% {
                opacity: 0.35;
                transform: translate(-2px, 1px);
            }
            10.3% {
                opacity: 0;
                transform: translate(0, 0);
            }
            50% {
                opacity: 0;
                transform: translate(0, 0);
            }
            52% {
                opacity: 0.3;
                transform: translate(2px, -1px);
            }
            52.2% {
                opacity: 0;
                transform: translate(0, 0);
            }
        }

        @keyframes subGlitchAfter {
            0%,
            100% {
                opacity: 0;
                transform: translate(0, 0);
            }
            10% {
                opacity: 0.35;
                transform: translate(2px, -1px);
            }
            10.3% {
                opacity: 0;
                transform: translate(0, 0);
            }
            50% {
                opacity: 0;
                transform: translate(0, 0);
            }
            52% {
                opacity: 0.3;
                transform: translate(-2px, 1px);
            }
            52.2% {
                opacity: 0;
                transform: translate(0, 0);
            }
        }

        /* ==================== DECORATIVE CORNER BRACKETS ==================== */
        .corner-bracket {
            position: absolute;
            width: 25px;
            height: 25px;
            border-color: var(--matrix-green);
            border-style: solid;
            opacity: 0.7;
            animation: bracketPulse 3s ease-in-out infinite;
        }
        .corner-bracket.top-left {
            top: -1px;
            left: -1px;
            border-width: 3px 0 0 3px;
        }
        .corner-bracket.top-right {
            top: -1px;
            right: -1px;
            border-width: 3px 3px 0 0;
        }
        .corner-bracket.bottom-left {
            bottom: -1px;
            left: -1px;
            border-width: 0 0 3px 3px;
        }
        .corner-bracket.bottom-right {
            bottom: -1px;
            right: -1px;
            border-width: 0 3px 3px 0;
        }

        @keyframes bracketPulse {
            0%,
            100% {
                opacity: 0.5;
            }
            50% {
                opacity: 0.9;
            }
        }

        /* ==================== BLINKING CURSOR ==================== */
        .cursor-blink {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background: var(--matrix-green);
            margin-left: 6px;
            vertical-align: text-bottom;
            animation: cursorBlink 1s step-end infinite;
            box-shadow: 0 0 8px var(--matrix-green), 0 0 16px var(--matrix-green);
            border-radius: 1px;
        }

        @keyframes cursorBlink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        /* ==================== FLOATING PARTICLES ==================== */
        .particle {
            position: fixed;
            z-index: 8;
            pointer-events: none;
            font-family: 'Courier New', monospace;
            color: var(--matrix-green);
            font-size: 12px;
            opacity: 0;
            animation: floatUp 6s linear infinite;
            text-shadow: 0 0 5px var(--matrix-green);
        }

        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(100vh) translateX(0) rotate(0deg);
            }
            10% {
                opacity: 0.8;
            }
            70% {
                opacity: 0.5;
            }
            100% {
                opacity: 0;
                transform: translateY(-10vh) translateX(30px) rotate(180deg);
            }
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 600px) {
            .glitch-container {
                padding: 25px 18px;
                margin: 0 15px;
                border-width: 1.5px;
            }
            .glitch-title {
                letter-spacing: 2px;
            }
            .glitch-subtitle {
                letter-spacing: 1px;
            }
            .corner-bracket {
                width: 18px;
                height: 18px;
            }
        }

        @media (min-width: 1200px) {
            .glitch-container {
                padding: 55px 50px;
                border-width: 3px;
            }
            .glitch-title {
                letter-spacing: 5px;
            }
            .glitch-subtitle {
                letter-spacing: 3px;
            }
        }
    </style>
</head>
<body>

    <!-- Matrix Rain Canvas -->
    <canvas id="matrixCanvas"></canvas>

    <!-- Scan Lines -->
    <div class="scanlines"></div>

    <!-- Vignette -->
    <div class="vignette"></div>

    <!-- Main Content -->
    <div class="content-wrapper">
        <div class="glitch-container">
            <!-- Corner brackets -->
            <span class="corner-bracket top-left"></span>
            <span class="corner-bracket top-right"></span>
            <span class="corner-bracket bottom-left"></span>
            <span class="corner-bracket bottom-right"></span>

            <!-- Title -->
            <div class="glitch-title" data-text="MORGANREIGNS303 IN HERE">
                MORGANREIGNS303 IN HERE<span class="cursor-blink"></span>
            </div>

            <!-- Subtitle -->
            <br>
            <div class="glitch-subtitle" data-text="404 NOT FOUND NGAPAIN LIAT-LIAT ?">
                404 NOT FOUND NGAPAIN LIAT-LIAT ?
            </div>
        </div>
    </div>

    <!-- Floating particles container -->
    <div id="particlesContainer"></div>

    <script>
        // ==================== MATRIX RAIN ====================
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let columns;
        let drops;
        let fontSize = 16;
        let charSets;

        function initMatrix() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            // Adjust font size based on screen width
            if (width < 500) {
                fontSize = 12;
            } else if (width < 900) {
                fontSize = 14;
            } else if (width < 1400) {
                fontSize = 16;
            } else {
                fontSize = 18;
            }

            columns = Math.floor(width / fontSize);
            drops = new Array(columns).fill(0);

            // Character sets for matrix rain
            charSets = [
                'アイウエオカキクケコサシスセソタチツテトナニヌネノ',
                'ハヒフヘホマミムメモヤユヨラリルレロワヲン',
                '0123456789',
                'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
                'ｦｧｨｩｪｫｬｭｮｯｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉ',
                '░▒▓█▄▀■□▪▫●○◘◙♦♣♠♥',
                '←↑→↓↔↕▲▼►◄△▽',
                '∑∏∫√∞≈≠≤≥±×÷',
                '!@#$%^&*()_+-=[]{}|;:",.<>/?',
            ];
        }

        function getRandomChar() {
            const set = charSets[Math.floor(Math.random() * charSets.length)];
            return set[Math.floor(Math.random() * set.length)];
        }

        function drawMatrix() {
            // Semi-transparent black to create fade trail
            ctx.fillStyle = 'rgba(0, 0, 0, 0.055)';
            ctx.fillRect(0, 0, width, height);

            // Set text style
            ctx.font = fontSize + 'px "Courier New", "MS Gothic", "Osaka", monospace';

            for (let i = 0; i < drops.length; i++) {
                const char = getRandomChar();
                const x = i * fontSize;
                const y = drops[i] * fontSize;

                // Leading character - bright white-green
                if (drops[i] > 0 && Math.random() < 0.03) {
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(char, x, y);
                }
                // First few in the trail - bright green
                else if (Math.random() < 0.15) {
                    ctx.fillStyle = '#00ff41';
                    ctx.shadowColor = '#00ff41';
                    ctx.shadowBlur = 8;
                    ctx.fillText(char, x, y);
                    ctx.shadowBlur = 0;
                }
                // Middle of trail - medium green
                else if (Math.random() < 0.3) {
                    ctx.fillStyle = '#00cc33';
                    ctx.fillText(char, x, y);
                }
                // Rest of trail - darker greens
                else {
                    const greenIntensity = Math.floor(Math.random() * 100) + 55;
                    ctx.fillStyle = `rgb(0, ${greenIntensity}, 0)`;
                    ctx.fillText(char, x, y);
                }

                // Reset drop when it reaches bottom or randomly
                if (drops[i] * fontSize > height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                // Occasionally reset a column early for variety
                if (Math.random() > 0.9985) {
                    drops[i] = 0;
                }

                drops[i]++;
            }
        }

        // ==================== FLOATING PARTICLES ==================== 
        function createParticle() {
            const particle = document.createElement('span');
            particle.classList.add('particle');
            particle.textContent = getRandomChar();
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (Math.random() * 8 + 4) + 's';
            particle.style.animationDelay = Math.random() * 6 + 's';
            particle.style.fontSize = (Math.random() * 10 + 8) + 'px';
            document.getElementById('particlesContainer').appendChild(particle);

            // Remove particle after animation ends
            setTimeout(() => {
                if (particle.parentNode) {
                    particle.parentNode.removeChild(particle);
                }
            }, 14000);
        }

        function spawnParticles() {
            // Spawn a few particles at intervals
            const count = Math.floor(Math.random() * 3) + 1;
            for (let i = 0; i < count; i++) {
                setTimeout(() => createParticle(), i * 200);
            }
        }

        // ==================== INITIALIZATION ====================
        function init() {
            initMatrix();
            // Start particle spawning
            setInterval(spawnParticles, 1500);
            // Spawn initial batch
            for (let i = 0; i < 15; i++) {
                setTimeout(() => createParticle(), i * 300);
            }
        }

        // ==================== ANIMATION LOOP ====================
        let animationId;
        function animate() {
            drawMatrix();
            animationId = requestAnimationFrame(animate);
        }

        // ==================== RESIZE HANDLER ====================
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                initMatrix();
            }, 250);
        });

        // ==================== START ====================
        init();
        animate();

        // ==================== CONSOLE EASTER EGG ====================
        console.log(`
            %c
            ███╗   ███╗ ██████╗ ██████╗  ██████╗  █████╗ ███╗   ██╗
            ████╗ ████║██╔═══██╗██╔══██╗██╔════╝ ██╔══██╗████╗  ██║
            ██╔████╔██║██║   ██║██████╔╝██║  ███╗███████║██╔██╗ ██║
            ██║╚██╔╝██║██║   ██║██╔══██╗██║   ██║██╔══██║██║╚██╗██║
            ██║ ╚═╝ ██║╚██████╔╝██║  ██║╚██████╔╝██║  ██║██║ ╚████║
            ╚═╝     ╚═╝ ╚═════╝ ╚═╝  ╚═╝ ╚═════╝ ╚═╝  ╚═╝╚═╝  ╚═══╝
            %c
            MORGANREIGNS303 WAS HERE.
            You're not supposed to be looking here either.
            404 - Nothing to see. Move along.
            %c
        `,
            'color: #00ff41; font-size: 12px;',
            'color: #cccccc; font-size: 13px;',
            'color: #888888;'
        );
    </script>
</body>
</html>
